<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>Acceso | Nicolas Fabian</title>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <meta name="robots" content="noindex, nofollow">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="/output.css" rel="stylesheet">

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="config.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebaseUtils.js"></script>


  <style>
    body { background-color:#050505; color:#f8fafc; overscroll-behavior-y:none; -webkit-tap-highlight-color:transparent; }
    .text-neon { color:#fff; text-shadow:0 0 5px rgba(255,255,255,0.4),0 0 10px rgba(255,255,255,0.2); }
    .border-neon { border-color:#fff; box-shadow:0 0 6px rgba(255,255,255,0.2),inset 0 0 6px rgba(255,255,255,0.05); }
    input:-webkit-autofill { -webkit-box-shadow:0 0 0 100px #111115 inset !important; -webkit-text-fill-color:#f8fafc !important; }
    .tab-btn.active { color:#fff; border-color:rgba(255,255,255,0.6); }
    .tab-btn { transition:all 0.2s; }
    /* Logo placeholder */
    .logo-initials {
      width:5rem; height:5rem; border-radius:50%;
      background:#000; border:2px solid #D4AF37;
      box-shadow:0 0 25px rgba(212,175,55,0.35);
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; font-weight:700; color:#D4AF37;
    }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col items-center justify-center px-6 py-12">

  <div class="w-full max-w-sm animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">

    <!-- Logo & Hero -->
    <div class="flex flex-col items-center mb-10">
      <img id="shopLogo" src="" alt=""
        class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-[0_0_25px_rgba(255,255,255,0.3)] mb-5"
        onerror="this.style.display='none';document.getElementById('logoFB').style.display='flex'">
      <div id="logoFB" class="logo-initials mb-5" style="display:none">FB</div>
      <h1 class="text-3xl font-bold tracking-tight text-neon text-center">Mi Agenda</h1>
      <p class="text-sm text-gray-400 mt-2 text-center leading-relaxed">
        Accede para ver tus citas.<br>Solo en <span id="shopNombre"></span>.
      </p>
    </div>

    <!-- Tabs Login / Registro -->
    <div class="flex mb-8 border-b border-white/10">
      <button id="tabLogin"
        class="tab-btn active flex-1 pb-3 text-sm font-bold text-center border-b-2 border-white/60 uppercase tracking-widest"
        onclick="switchTab('login')">Iniciar Sesión</button>
      <button id="tabRegister"
        class="tab-btn flex-1 pb-3 text-sm font-bold text-center border-b-2 border-transparent text-gray-500 uppercase tracking-widest"
        onclick="switchTab('register')">Crear Cuenta</button>
    </div>

    <!-- Error / Success Banner -->
    <div id="alertBanner" class="hidden mb-5 px-4 py-3 rounded-xl border text-sm font-medium text-center"></div>

    <!-- PANEL LOGIN -->
    <div id="panelLogin">
      <div class="space-y-4">
        <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email"
          class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600">
        <div class="relative">
          <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password"
            class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600 pr-14">
          <button onclick="togglePwd('loginPassword',this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="loginWithEmail()"
        class="mt-6 w-full bg-white/5 border-2 border-neon text-neon font-bold py-4 rounded-[2rem] shadow-[0_0_18px_rgba(255,255,255,0.12)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base hover:bg-white/10">
        <i class="ph-bold ph-sign-in text-lg"></i> Ingresar
      </button>
    </div>

    <!-- PANEL REGISTRO -->
    <div id="panelRegister" class="hidden">
      <div class="space-y-4">
        <input type="text" id="regNombre" placeholder="Nombre completo" autocomplete="name"
          class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600">
        <input type="email" id="regEmail" placeholder="Correo electrónico" autocomplete="email"
          class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600">
        <input type="tel" id="regTelefono" placeholder="+56 9 1234 5678" autocomplete="tel" inputmode="numeric"
          class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600">
        <div class="relative">
          <input type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password"
            class="w-full bg-brand-card border border-white/15 rounded-2xl px-5 py-4 text-brand-text text-base font-medium focus:outline-none focus:border-white/60 transition-all placeholder-gray-600 pr-14">
          <button onclick="togglePwd('regPassword',this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="registerWithEmail()"
        class="mt-6 w-full bg-white/5 border-2 border-neon text-neon font-bold py-4 rounded-[2rem] shadow-[0_0_18px_rgba(255,255,255,0.12)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base hover:bg-white/10">
        <i class="ph-bold ph-user-plus text-lg"></i> Crear cuenta
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-white/10"></div>
      <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">o continúa con</span>
      <div class="flex-1 h-px bg-white/10"></div>
    </div>

    <!-- Google Auth -->
    <button onclick="loginWithGoogle()"
      class="w-full flex items-center justify-center gap-3 bg-[#111115] border border-white/15 text-gray-200 font-semibold py-4 rounded-[2rem] active:scale-[0.98] transition-all hover:border-white/30 hover:bg-[#1a1a22] text-sm">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.3-13.5-10l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="text-center text-xs text-gray-600 mt-8">
      <a href="index.html" class="hover:text-gray-400 transition-colors flex items-center justify-center gap-1">
        <i class="ph ph-arrow-left text-sm"></i> Volver a Agendar
      </a>
    </p>

  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-[#050505]/80 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div class="w-12 h-12 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
      <span class="text-sm text-gray-400 font-medium">Ingresando...</span>
    </div>
  </div>

<script>
  function showLoading(msg = 'Ingresando...') {
    document.querySelector('#loadingOverlay span').textContent = msg;
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').classList.add('flex');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('flex');
  }
  function showAlert(msg, isError = true) {
    const el = document.getElementById('alertBanner');
    el.textContent = msg;
    el.className = `mb-5 px-4 py-3 rounded-xl border text-sm font-medium text-center ${
      isError ? 'bg-red-950/50 border-red-500/40 text-red-300' : 'bg-emerald-950/50 border-emerald-500/40 text-emerald-300'
    }`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = `<i class="ph ph-${isText ? 'eye' : 'eye-slash'} text-xl"></i>`;
  }
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('panelLogin').classList.toggle('hidden', !isLogin);
    document.getElementById('panelRegister').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').className   = `tab-btn ${isLogin ? 'active' : 'text-gray-500'} flex-1 pb-3 text-sm font-bold text-center border-b-2 ${isLogin ? 'border-white/60' : 'border-transparent'} uppercase tracking-widest`;
    document.getElementById('tabRegister').className = `tab-btn ${!isLogin ? 'active' : 'text-gray-500'} flex-1 pb-3 text-sm font-bold text-center border-b-2 ${!isLogin ? 'border-white/60' : 'border-transparent'} uppercase tracking-widest`;
  }

  async function ensureUserDoc(user, extra = {}) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        nombre:   extra.nombre   || user.displayName || '',
        email:    user.email     || '',
        telefono: extra.telefono || '',
        photoURL: user.photoURL  || null,
        stamps:   0,
        creadoEn: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }

  function goToDashboard() { window.location.href = 'dashboard.html'; }

  let _registering = false;
  auth.onAuthStateChanged(user => { if (user && !_registering) goToDashboard(); });

  async function loginWithGoogle() {
    showLoading('Conectando con Google...');
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result   = await auth.signInWithPopup(provider);
      await ensureUserDoc(result.user);
      goToDashboard();
    } catch (err) { hideLoading(); showAlert(friendlyError(err.code)); }
  }

  async function loginWithEmail() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Completa todos los campos.');
    showLoading();
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      await ensureUserDoc(cred.user);
      goToDashboard();
    } catch (err) { hideLoading(); showAlert(friendlyError(err.code)); }
  }

  async function registerWithEmail() {
    const nombre   = document.getElementById('regNombre').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const telefono = document.getElementById('regTelefono').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!nombre || !email || !telefono || !password) return showAlert('Completa todos los campos.');
    if (!validatePhone(telefono)) return showAlert('Ingresa un teléfono válido. Debe comenzar con +56 9 seguido de 8 dígitos.');
    if (password.length < 6) return showAlert('La contraseña debe tener al menos 6 caracteres.');
    showLoading('Creando cuenta...');
    _registering = true;
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: nombre });
      await ensureUserDoc(cred.user, { nombre, telefono });
      goToDashboard();
    } catch (err) { hideLoading(); showAlert(friendlyError(err.code)); }
    finally { _registering = false; }
  }

  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use':   'Ese correo ya está registrado.',
      'auth/invalid-email':          'El correo no es válido.',
      'auth/weak-password':          'Contraseña muy débil (mín. 6 caracteres).',
      'auth/user-not-found':         'No existe una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/invalid-credential':     'Correo o contraseña incorrectos.',
      'auth/popup-closed-by-user':   'Cerraste la ventana de Google.',
      'auth/network-request-failed': 'Sin conexión. Revisa tu internet.',
      'auth/too-many-requests':      'Demasiados intentos. Espera un momento.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('panelLogin').classList.contains('hidden')) loginWithEmail();
    else registerWithEmail();
  });

  function initPhonePrefix(inputId) {
    const PREFIX = '+56 9 ';
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('focus', () => { if (!input.value.startsWith('+56')) input.value = PREFIX; });
    input.addEventListener('input', () => { if (!input.value.startsWith('+56')) input.value = PREFIX; });
    input.addEventListener('keydown', e => {
      if ((e.key === 'Backspace' || e.key === 'Delete') && input.selectionStart <= PREFIX.length) e.preventDefault();
    });
  }

  function validatePhone(value) {
    return /^\+56\s?9\s?\d{4}\s?\d{4}$/.test(value.trim());
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.title = `Acceso | ${SHOP.nombre}`;
    const logoImg = document.getElementById('shopLogo');
    if (SHOP.logo) { logoImg.src = SHOP.logo; logoImg.alt = SHOP.nombre; }
    else { logoImg.style.display = 'none'; document.getElementById('logoFB').style.display = 'flex'; }
    document.getElementById('shopNombre').textContent = SHOP.nombre;
    initPhonePrefix('regTelefono');
  });
</script>
</body>
</html>
