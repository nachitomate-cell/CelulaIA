<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Elegance | Panel Interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="/output.css" rel="stylesheet">
  <script src="config.js"></script>
  <script src="db.js"></script>
  <style>
    body {
      background-color: #0a0a0a;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      color: #f9fafb;
      overscroll-behavior-y: none;
    }
    .metric-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.375rem;
      padding: 1.5rem;
    }
    .agenda-column {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.375rem;
      overflow: hidden;
    }
    .agenda-column-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #09090b;
      border-bottom: 1px solid #3f3f46;
    }
    .slot-free {
      border-bottom: 1px solid rgba(39, 39, 42, 0.5);
      color: #52525b;
      transition: background-color .18s ease, color .18s ease;
    }
    .slot-free:hover {
      background: #18181b;
      color: #71717a;
      cursor: pointer;
    }
    .slot-booked {
      background: #ffffff;
      color: #000000;
      border-left: 4px solid #000000;
      border-radius: 0.125rem;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }
    .daily-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.375rem;
    }
  </style>
</head>
<body class="font-sans antialiased min-h-[100dvh] bg-zinc-950 text-gray-100 pb-24 md:pb-0 relative overflow-x-hidden">
  <div id="adminApp">
    <header class="md:hidden fixed top-0 left-0 right-0 h-16 bg-zinc-950 border-b border-zinc-800 flex items-center px-4 z-50 gap-3">
      <button onclick="window.location.href='index.html'" class="w-10 h-10 flex items-center justify-center rounded-md hover:bg-white/5 transition-colors shrink-0 -ml-1">
        <i class="ph-bold ph-arrow-left text-xl text-gray-300"></i>
      </button>
      <div class="w-8 h-8 rounded-sm bg-zinc-800 border border-zinc-700 shrink-0"></div>
      <h1 class="text-sm font-bold flex-1 truncate uppercase tracking-wider">Panel Interno</h1>
    </header>

    <div class="flex h-[100dvh] overflow-hidden">
      <aside class="hidden md:flex flex-col w-64 bg-zinc-950 border-r border-zinc-800 shrink-0">
        <div class="p-5 border-b border-zinc-800 flex items-center gap-3">
          <div class="h-10 w-10 rounded-sm bg-zinc-800 border border-zinc-700 shrink-0"></div>
          <div class="flex-1 min-w-0">
            <h1 class="text-sm font-bold leading-tight uppercase tracking-wider">Panel Admin</h1>
            <p class="text-xs text-zinc-500 truncate">Elegance Barbershop</p>
          </div>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
          <button class="w-full flex items-center gap-3 bg-white text-black px-4 py-3 min-h-[44px] rounded-md font-semibold text-sm">
            <i class="ph-fill ph-calendar-check text-lg"></i> Citas de la Agenda
          </button>
          <button class="w-full flex items-center gap-3 text-zinc-400 px-4 py-3 min-h-[44px] rounded-md font-semibold text-sm">
            <i class="ph ph-list-dashes text-lg"></i> Servicios
          </button>
          <button class="w-full flex items-center gap-3 text-zinc-400 px-4 py-3 min-h-[44px] rounded-md font-semibold text-sm">
            <i class="ph ph-gear text-lg"></i> Configuración
          </button>
          <button class="w-full flex items-center gap-3 text-zinc-400 px-4 py-3 min-h-[44px] rounded-md font-semibold text-sm">
            <i class="ph ph-users text-lg"></i> Clientes y Fidelización
          </button>
        </nav>
      </aside>

      <main class="flex-1 h-full overflow-y-auto w-full px-4 py-6 lg:px-10 lg:py-10 pt-20 md:pt-10">
        <div class="w-full max-w-[1600px] mx-auto">
          <div class="mb-8">
            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-4">Agenda Demo · Vista multi-barbero</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="metric-card">
                <span class="block text-4xl font-bold text-white mb-1 truncate" id="metricTotal">0</span>
                <span class="text-xs text-zinc-500 uppercase tracking-widest">Citas</span>
              </div>
              <div class="metric-card">
                <span class="block text-4xl font-bold text-white mb-1 truncate" id="metricRevenue">$0</span>
                <span class="text-xs text-zinc-500 uppercase tracking-widest">Ganancias</span>
              </div>
              <div class="metric-card">
                <span class="block text-4xl font-bold text-white mb-1 truncate" id="metricFree">0</span>
                <span class="text-xs text-zinc-500 uppercase tracking-widest">Libres</span>
              </div>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-2">
              <input type="date" id="agendaDate" class="bg-zinc-900 border border-zinc-800 rounded-md px-4 py-3 text-sm text-white focus:outline-none">
            </div>
            <a href="index.html" class="hidden sm:flex items-center gap-2 bg-white text-black font-bold px-5 py-3 rounded-md text-sm">Ver reservas</a>
          </div>

          <div class="grid cols-1 md:grid-cols-2 gap-6" id="agendaColumns"></div>

          <div class="mt-12">
            <div class="flex items-center gap-2 mb-4">
              <i class="ph ph-clock text-zinc-300"></i>
              <span class="text-sm font-bold text-zinc-300 uppercase tracking-widest">Reservas del día</span>
            </div>
            <div id="dailyList" class="grid grid-cols-1 lg:grid-cols-2 gap-3"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const agendaDate = document.getElementById('agendaDate');
    agendaDate.value = DemoDB.isoDate(new Date());

    function renderAdmin() {
      const date = agendaDate.value;
      const bookings = DemoDB.getBookingsByDate(date);
      const barbers = DemoDB.getBarbers().filter((b) => b.nombre !== 'Cualquier Barbero');
      const totalRevenue = bookings.reduce((sum, booking) => sum + Number(booking.precioServicio || 0), 0);

      document.getElementById('metricTotal').textContent = bookings.length;
      document.getElementById('metricRevenue').textContent = DemoDB.formatCurrency(totalRevenue);

      const columns = document.getElementById('agendaColumns');
      columns.innerHTML = '';
      let freeCount = 0;

      barbers.forEach((barber) => {
        const card = document.createElement('div');
        card.className = 'agenda-column';
        card.innerHTML = `
          <div class="agenda-column-header px-5 py-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-sm bg-zinc-800 border border-zinc-700"></div>
            <div class="min-w-0">
              <div class="text-xl font-bold uppercase tracking-wider text-white">${barber.nombre}</div>
              <div class="text-[10px] text-zinc-500 uppercase tracking-[0.22em]">Agenda paralela</div>
            </div>
          </div>
        `;

        const slotsWrap = document.createElement('div');
        slotsWrap.className = 'px-4 py-2';
        const slots = DemoDB.getAvailableHours(date, 30, barber.nombre);
        const barberBookings = DemoDB.getBookingsByBarberAndDate(date, barber.nombre);

        slots.forEach((slot) => {
          const booking = barberBookings.find((item) => item.hora === slot.time);
          const row = document.createElement('div');
          row.className = booking
            ? 'slot-booked px-4 py-3 mb-3'
            : 'slot-free px-2 py-3';
          if (!booking) freeCount += 1;
          row.innerHTML = booking
            ? `
              <div class="flex items-start gap-4">
                <div class="text-[11px] font-bold uppercase tracking-widest text-black min-w-[52px] pt-1">${slot.time}</div>
                <div class="min-w-0">
                  <div class="font-bold text-lg text-black leading-tight">${booking.clienteNombre}</div>
                  <div class="text-sm text-zinc-600 mt-1">${booking.servicioNombre}</div>
                </div>
              </div>`
            : `
              <div class="flex items-center justify-between gap-3">
                <div class="text-[11px] font-semibold uppercase tracking-widest text-zinc-600">${slot.time}</div>
                <div class="text-sm text-zinc-600">Disponible</div>
              </div>`;
          slotsWrap.appendChild(row);
        });

        card.appendChild(slotsWrap);
        columns.appendChild(card);
      });

      document.getElementById('metricFree').textContent = freeCount;
      const dailyList = document.getElementById('dailyList');
      dailyList.innerHTML = bookings.length ? bookings.map((booking) => `
        <div class="daily-card px-5 py-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm font-bold text-white">${booking.clienteNombre}</p>
              <p class="text-xs text-zinc-500 mt-1">${booking.servicioNombre} · ${booking.barbero}</p>
            </div>
            <div class="text-right">
              <p class="text-sm font-bold text-white">${booking.hora}</p>
              <p class="text-xs text-zinc-500 mt-1">${DemoDB.formatCurrency(booking.precioServicio || 0)}</p>
            </div>
          </div>
        </div>
      `).join('') : `<div class="daily-card px-5 py-6 text-sm text-zinc-500">No hay reservas para esta fecha.</div>`;
    }

    agendaDate.addEventListener('change', renderAdmin);
    renderAdmin();
  </script>
</body>
</html>
